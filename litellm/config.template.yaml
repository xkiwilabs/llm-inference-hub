model_list:
  - model_name: small
    litellm_params:
      model: hosted_vllm/${SMALL_MODEL}
      api_base: http://vllm-small:8001/v1
      api_key: "no-key-needed"

  - model_name: large
    litellm_params:
      model: hosted_vllm/${LARGE_MODEL}
      api_base: http://vllm-large:8002/v1
      api_key: "no-key-needed"

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL

litellm_settings:
  drop_params: true
