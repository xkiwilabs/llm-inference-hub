services:
  vllm-small:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${SMALL_MODEL_GPU:-0}
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_MXFP4_USE_MARLIN=1
    volumes:
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    command: >
      --model ${SMALL_MODEL}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.90}
      --port 8001
      --host 0.0.0.0
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  vllm-large:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${LARGE_MODEL_GPUS:-0,1}
      - HF_TOKEN=${HF_TOKEN}
      - VLLM_MXFP4_USE_MARLIN=1
    volumes:
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    command: >
      --model ${LARGE_MODEL}
      --tensor-parallel-size ${TENSOR_PARALLEL_SIZE:-1}
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.90}
      --port 8002
      --host 0.0.0.0
    ports:
      - "127.0.0.1:8002:8002"
    deploy:
      replicas: ${LARGE_MODEL_REPLICAS:-0}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - SMALL_MODEL=${SMALL_MODEL}
      - LARGE_MODEL=${LARGE_MODEL}
      - LITELLM_API_KEYS=${LITELLM_API_KEYS}
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000 --host 0.0.0.0
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      vllm-small:
        condition: service_healthy
    restart: unless-stopped
