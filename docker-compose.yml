services:
  vllm-small:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-cu130-nightly}
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${SMALL_MODEL_GPU:-0}
      - NVIDIA_DISABLE_REQUIRE=true
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    command: >
      --model ${SMALL_MODEL}
      --gpu-memory-utilization ${SMALL_GPU_MEM_UTIL:-0.65}
      --max-model-len ${MAX_MODEL_LEN:-32768}
      --enable-auto-tool-choice
      --tool-call-parser ${TOOL_CALL_PARSER:-gemma4}
      --reasoning-parser ${TOOL_CALL_PARSER:-gemma4}
      --chat-template examples/tool_chat_template_gemma4.jinja
      --port 8001
      --host 0.0.0.0
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  vllm-large:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-cu130-nightly}
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=${LARGE_MODEL_GPUS:-1}
      - NVIDIA_DISABLE_REQUIRE=true
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    command: >
      --model ${LARGE_MODEL}
      --tensor-parallel-size ${TENSOR_PARALLEL_SIZE:-1}
      --gpu-memory-utilization ${LARGE_GPU_MEM_UTIL:-0.50}
      --max-model-len ${MAX_MODEL_LEN:-32768}
      --quantization modelopt
      --kv-cache-dtype fp8
      --enable-auto-tool-choice
      --tool-call-parser ${TOOL_CALL_PARSER:-gemma4}
      --reasoning-parser ${TOOL_CALL_PARSER:-gemma4}
      --chat-template examples/tool_chat_template_gemma4.jinja
      --port 8002
      --host 0.0.0.0
    ports:
      - "127.0.0.1:8002:8002"
    deploy:
      replicas: ${LARGE_MODEL_REPLICAS:-0}
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=litellm
      - POSTGRES_USER=litellm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - SMALL_MODEL=${SMALL_MODEL}
      - LARGE_MODEL=${LARGE_MODEL}
      - DATABASE_URL=postgresql://litellm:${POSTGRES_PASSWORD}@postgres:5432/litellm
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000 --host 0.0.0.0
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    depends_on:
      vllm-small:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
